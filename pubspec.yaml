name: auramed
description: Smart Medicine Reminder App with local push notifications

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local push notification scheduling
  flutter_local_notifications: ^17.0.0

  # Timezone support (required by flutter_local_notifications for scheduling)
  timezone: ^0.9.4

  # HTTP client for connecting to Flask API
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
